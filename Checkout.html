<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #eaf0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      color: #111;
      margin-bottom: 28px;
    }

    /* Stepper */
    .stepper {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      gap: 0;
    }

    .step {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      z-index: 1;
    }

    .step.active {
      background-color: #4caf50;
      color: #fff;
    }

    .step.inactive {
      background-color: #d0d0d0;
      color: #888;
    }

    .step-line {
      width: 140px;
      height: 2px;
      background-color: #c0c0c0;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ddd;
      padding: 28px 30px 40px 30px;
      max-width: 1380px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 17px;
      font-weight: 700;
      color: #111;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 7px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      color: #222;
      background: #fff;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #aaa;
    }

    .payment-section {
      margin-top: 28px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 14px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      color: #222;
      cursor: pointer;
    }

    input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
    }

    input[type="radio"]:checked {
      border-color: #1a237e;
    }

    input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #1a237e;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .pay-btn-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 36px;
    }

    .pay-btn {
      background: linear-gradient(to bottom, #f26c4f, #e8412a);
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 16px 70px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
        .card {
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 10px;
      padding: 20px 28px 24px 28px;
      width: 100%;
      max-width: 1480px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      padding-bottom: 16px;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 18px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #222;
      margin-bottom: 10px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 700;
      color: #111;
      margin-top: 6px;
    }

  </style>
</head>
<body>

  <h1>Checkout</h1>

  <!-- Stepper -->
  <div class="stepper">
    <div class="step active">1</div>
    <div class="step-line"></div>
    <div class="step inactive">2</div>
    <div class="step-line"></div>
    <div class="step inactive">3</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="section-title">Delivery Information</div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" value="">
    </div>

    <div class="form-group">
      <label>Address</label>
      <input type="text" value="">
    </div>

    <div class="form-group">
      <label>City</label>
      <input type="text" value="">
    </div>

    <div class="form-group">
      <label>Zip Code</label>
      <input type="text" value="">
    </div>

    <!-- Payment Options -->
    <div class="payment-section">
      <div class="section-title">Payment Options</div>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="payment" checked>
          Credit/Debit Card
        </label>
        <label class="radio-label">
          <input type="radio" name="payment">
          UPI
        </label>
        <label class="radio-label">
          <input type="radio" name="payment">
          Net Banking
        </label>
      </div>
    </div>
    <!-- Pay Button -->
    <div class="pay-btn-wrapper">
      <button class="pay-btn"><a href="Pay.html" style="text-decoration: none; color: white;">Pay</a></button>
    </div>
  </div><br>
  <div class="card">
    <div class="card-title">Order Summary</div>

    <div class="item-row">
      <span>Item 1</span>
      <span>$29.99</span>
    </div>
    <div class="item-row">
      <span>Item 2</span>
      <span>$49.99</span>
    </div>
    <div class="item-row">
      <span>Item 3</span>
      <span>$19.99</span>
    </div>

    <div class="total-row">
      <span>Total</span>
      <span>$99.97</span>
    </div>
  </div>

</body>
</html>
