<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ebebeb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px 40px;
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      color: #111;
      margin-bottom: 50px;
      text-align: center;
    }

    /* Oval checkmark using border-radius ellipse */
    .check-icon {
      width: 280px;
      height: 220px;
      border: 14px solid #44ee44;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 50px;
    }

    /* CSS-only checkmark */
    .checkmark {
      position: relative;
      width: 140px;
      height: 100px;
      top: 10px;
    }

    .checkmark::before {
      content: '';
      position: absolute;
      background-color: #44ee44;
      width: 55px;
      height: 22px;
      border-radius: 4px;
      bottom: 0;
      left: -25px;
      transform: rotate(45deg);
      transform-origin: right bottom;
    }
    /* Short left arm of checkmark */
     .checkmark::after {
      content: '';
      position: absolute;
      background-color: #44ee44;
      width: 110px;
      height: 22px;
      border-radius: 4px;
      bottom: 0;
      left: 32px;
      transform: rotate(-55deg);
      transform-origin: left bottom;
    }

    .order-number {
      font-size: 28px;
      color: #111;
      margin-bottom: 60px;
      align-self: flex-start;
      padding-left: 40px;
    }

    .track-btn {
      width: 100%;
      max-width: 1100px;
      padding: 28px;
      background-color: #f07060;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 30px;
      font-weight: 400;
      cursor: pointer;
      font-family: Georgia, 'Times New Roman', serif;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>

  <h1>Order confirmed</h1>

  <div class="check-icon">
    <div class="checkmark"></div>
  </div>

  <div class="order-number">Your order number:#123456</div>

  <button class="track-btn" ><a href="Trackorder.html" style="text-decoration: none; color: white;">Track your order</a></button>

</body>
</html>
