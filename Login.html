<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f2f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      background: #f0f2f4;
      width: 100%;
      max-width: 780px;
      padding: 48px 40px 40px 40px;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      color: #111;
      letter-spacing: 1px;
      margin-bottom: 40px;
    }

    .field-label {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      margin-bottom: 12px;
    }

    .input-box {
      width: 100%;
      background: #e2e4e7;
      border: none;
      border-radius: 18px;
      padding: 26px 28px;
      font-size: 20px;
      font-weight: 700;
      color: #999;
      outline: none;
      margin-bottom: 28px;
      font-family: inherit;
    }

    .input-box::placeholder {
      color: #999;
      font-weight: 700;
    }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
    }

    .forgot-row a {
      font-size: 15px;
      font-weight: 700;
      color: #e8453c;
      text-decoration: none;
    }

    .forgot-row span {
      font-size: 15px;
      font-weight: 700;
      color: #e8453c;
    }

    .sign-in-btn {
      width: 100%;
      background: #f07068;
      border: none;
      border-radius: 18px;
      padding: 26px;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1.5px;
      cursor: pointer;
      font-family: inherit;
    }
        .or-text {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: #111;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    .social-btn {
      width: 100%;
      background: #fff;
      border: 2px solid #111;
      border-radius: 16px;
      padding: 22px 28px;
      font-size: 20px;
      font-weight: 800;
      color: #111;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
      text-decoration: none;
    }

    .social-btn .icon {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Google G logo using SVG */
    .google-icon {
      font-size: 22px;
      font-weight: 700;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4285F4 25%, #EA4335 25%, #EA4335 50%, #FBBC05 50%, #FBBC05 75%, #34A853 75%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Apple logo */
    .apple-icon {
      font-size: 24px;
      color: #555;
      line-height: 1;
    }

    .signup-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      font-size: 17px;
    }

    .signup-row span {
      font-weight: 700;
      color: #111;
    }

    .signup-row a {
      font-weight: 700;
      color: #f07068;
      text-decoration: none;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>WELCOME</h1>

    <div class="field-label">Email</div>
    <input class="input-box" type="email" placeholder="Enter a email id" />

    <div class="field-label">Password</div>
    <input class="input-box" type="password" placeholder="Enter a password" />

    <div class="forgot-row">
      <a href="#">Forgot password</a>
      <span>?</span>
    </div>

    <button class="sign-in-btn"><a href="Homepage.html" style="text-decoration: none; color: white;">SIGN IN</a></button>
    <div class="or-text">OR</div>

    <!-- Continue with Google -->
    <a href="#" class="social-btn">
      <span class="icon">
        <svg width="24" height="24" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.1 0 5.6 1.1 7.6 2.9l5.6-5.6C33.6 3.5 29.1 1.5 24 1.5 14.9 1.5 7.2 7.1 4 15l6.6 5.1C12.3 13.6 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z"/>
          <path fill="#FBBC05" d="M10.6 28.4A14.6 14.6 0 0 1 9.5 24c0-1.5.3-3 .7-4.4L3.7 14.5A23 23 0 0 0 1 24c0 3.7.9 7.2 2.5 10.3l7.1-5.9z"/>
          <path fill="#34A853" d="M24 46.5c5.1 0 9.4-1.7 12.5-4.6l-7.4-5.7c-2 1.4-4.6 2.2-7.1 2.2-6.3 0-11.6-4.2-13.5-9.9l-7.1 5.5C7.1 40.8 15 46.5 24 46.5z"/>
        </svg>
      </span>
      Continue with Google
    </a>

    <!-- Continue with Apple -->
    <a href="#" class="social-btn">
      <span class="icon">
        <svg width="24" height="24" viewBox="0 0 24 24">
          <path fill="#555" d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.39.07 2.36.74 3.18.8 1.21-.24 2.37-.93 3.67-.84 1.58.13 2.77.77 3.54 1.95-3.25 1.94-2.48 5.93.57 7.07-.66 1.72-1.52 3.43-2.96 4.9zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
      </span>
      Continue with Apple
    </a>

    <!-- Sign Up row -->
    <div class="signup-row">
      <span>Don't &nbsp;have an account?</span>
      <a href="Account.html">Sign Up</a>
    </div>

  </div>
</body>
</html>
